<doctype html>
    <html lang="en">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>BrandAppart Sticky Cards</title>
            <link rel="stylesheet" href="styles.css">
            <script type="importmap">
            {
                "imports": {
                    "gsap": "https://cdn.jsdelivr.net/npm/gsap@3.12.5/index.js",
                    "gsap/ScrollTrigger": "https://cdn.jsdelivr.net/npm/gsap@3.12.5/ScrollTrigger.js",
                    "@lenisjs/lenis": "https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.42/+esm"
                }
            }
            </script>
        </head>
        <body>
            <section class="intro">
                <h1>Enter the Frame</h1>
            </section>

            <section class="sticky-cards"> 
                <div class="card" id="card-1">
                    <div class="col">
                        <p>Quick Control</p>
                        <h1>Signal Drift</h1>
                    </div>
                    <div class="col">
                        <img src="card-img-1.jpg" alt="">
                    </div>
                </div>
                <div class="card" id="card-2">
                    <div class="col">
                        <p>Quick Control</p>
                        <h1>Skyline Drift</h1>
                    </div>
                    <div class="col">
                        <img src="card-img-2.jpg" alt="">
                    </div>
                </div>
                <div class="card" id="card-3">
                    <div class="col">
                        <p>Quick Control</p>
                        <h1>Signal Drift</h1>
                    </div>
                    <div class="col">
                        <img src="card-img-3.jpg" alt="">
                    </div>
                </div>
                <div class="card" id="card-4">
                    <div class="col">
                        <p>Quick Control</p>
                        <h1>Signal Drift</h1>
                    </div>
                    <div class="col">
                        <img src="card-img-4.jpg" alt="">
                    </div>
                </div>
                <div class="card" id="card-5">
                    <div class="col">
                        <p>Quick Control</p>
                        <h1>Signal Drift</h1>
                    </div>
                    <div class="col">
                        <img src="card-img-5.jpg" alt="">
                    </div>
                </div>

            </section>

            <section class="outro"> 
                <h1>Loop completed </h1>
            </section>
            <script type="module" src="script.js"></script>
        </body>
    </html>
